{% extends "base.html" %}
{% block title %}Logowanie{% endblock %}
{% block content %}
<h1>Logowanie</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="/login">
  <label>Kod dostępu
    <input type="password" name="code" autofocus required />
  </label>
  <button type="submit">Zaloguj</button>
</form>
{% endblock %}
